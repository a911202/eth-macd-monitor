name: ETH 15M MACD Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: eth_macd_15m_state.json
          key: macd-15m-state-v1
          restore-keys: |
            macd-15m-state-
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Run 15M MACD Monitor
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: node eth_macd_monitor.js
